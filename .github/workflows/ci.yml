name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  test-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          toolchain_version: "stable"

      - name: Build contract
        run: forge build

      - name: Run tests
        run: forge test -vvv

  deploy-contract:
    needs: [test-contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          toolchain_version: "stable"

      - name: Build contract
        run: forge build

      - name: Deploy to Polygon Amoy
        env:
          POLYGONSCAN_API_KEY: ${{ vars.POLYGONSCAN_API_KEY }}
        run: |
          forge script script/Deploy.s.sol:Deploy \
            --rpc-url ${{ vars.POLYGON_AMOY_RPC_URL }} \
            --private-key ${{ secrets.PRIVATE_KEY }} \
            --broadcast \
            --verify \
            --etherscan-api-key ${{ vars.POLYGONSCAN_API_KEY }} \
            -vvvv
